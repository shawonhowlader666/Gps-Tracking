<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Dynamic vehicle: Container Truck -->
  <!-- Shadow under the truck -->
  <rect x="15" y="4" width="34" height="56" rx="4" fill="black" fill-opacity="0.15" />
  
  <!-- Tires -->
  <rect x="13" y="10" width="4" height="10" rx="1.5" fill="#1E293B" />
  <rect x="47" y="10" width="4" height="10" rx="1.5" fill="#1E293B" />
  <!-- Rear Tandem Axles -->
  <rect x="12" y="38" width="5" height="9" rx="1.5" fill="#1E293B" />
  <rect x="47" y="38" width="5" height="9" rx="1.5" fill="#1E293B" />
  <rect x="12" y="48" width="5" height="9" rx="1.5" fill="#1E293B" />
  <rect x="47" y="48" width="5" height="9" rx="1.5" fill="#1E293B" />

  <!-- Cab (Front) (Uses #MAIN_COLOR) -->
  <path d="M18 4 H46 V19 H18 Z" fill="#MAIN_COLOR" />
  <!-- Cab shading -->
  <path d="M18 4 H32 V19 H18 Z" fill="black" fill-opacity="0.1" />
  <path d="M32 4 H46 V19 H32 Z" fill="white" fill-opacity="0.08" />

  <!-- Windshield -->
  <path d="M20 9 H44 V5 H20 Z" fill="#0F172A" />
  <path d="M21 8 H43 V6 H21 Z" fill="#38BDF8" />
  <path d="M35 6 L31 8 H29 L33 6 Z" fill="white" fill-opacity="0.4" />

  <!-- Long Container (Rear) - Sleek corrugated metal look -->
  <rect x="16" y="19" width="32" height="41" rx="2" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1" />
  <!-- Container shadow left side -->
  <rect x="16" y="19" width="16" height="41" rx="1" fill="black" fill-opacity="0.05" />
  
  <!-- Container Grooves (Horizontal ridges) -->
  <line x1="20" y1="25" x2="44" y2="25" stroke="#E2E8F0" stroke-width="1.5" />
  <line x1="20" y1="31" x2="44" y2="31" stroke="#E2E8F0" stroke-width="1.5" />
  <line x1="20" y1="37" x2="44" y2="37" stroke="#E2E8F0" stroke-width="1.5" />
  <line x1="20" y1="43" x2="44" y2="43" stroke="#E2E8F0" stroke-width="1.5" />
  <line x1="20" y1="49" x2="44" y2="49" stroke="#E2E8F0" stroke-width="1.5" />
  <line x1="20" y1="55" x2="44" y2="55" stroke="#E2E8F0" stroke-width="1.5" />
</svg>
