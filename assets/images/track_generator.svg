<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Dynamic device: Generator -->
  <!-- Shadow -->
  <rect x="11" y="9" width="42" height="46" rx="6" fill="black" fill-opacity="0.15" />

  <!-- Frame Outer Body (Uses #MAIN_COLOR) -->
  <rect x="12" y="10" width="40" height="44" rx="6" fill="#MAIN_COLOR" />

  <!-- Left Side Shading of generator body -->
  <path d="M12 16 C12 12.7 14.7 10 18 10 H32 V54 H18 C14.7 54 12 51.3 12 48 Z" fill="black" fill-opacity="0.1" />

  <!-- Right Side Highlight of generator body -->
  <path d="M32 10 H46 C49.3 10 52 12.7 52 16 V48 C52 51.3 49.3 54 46 54 H32 Z" fill="white" fill-opacity="0.08" />

  <!-- Grill Vents (Upper section) -->
  <rect x="18" y="16" width="28" height="12" rx="2" fill="#1E293B" />
  <line x1="22" y1="20" x2="42" y2="20" stroke="#475569" stroke-width="1.5" stroke-linecap="round" />
  <line x1="22" y1="24" x2="42" y2="24" stroke="#475569" stroke-width="1.5" stroke-linecap="round" />

  <!-- Control Panel -->
  <rect x="18" y="32" width="28" height="16" rx="2" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1" />
  <!-- Shadow on left side of control panel -->
  <path d="M18 32 H32 V48 H18 Z" fill="black" fill-opacity="0.04" />
  
  <!-- Gauges & Knobs -->
  <circle cx="24" cy="40" r="3" fill="#64748B" />
  <circle cx="24" cy="40" r="1.5" fill="#F1F5F9" />
  
  <!-- Status Lights (Red & Green LEDs) -->
  <circle cx="33" cy="40" r="1.5" fill="#EF4444" />
  <circle cx="39" cy="40" r="1.5" fill="#22C55E" />
  
  <!-- Toggle Switch -->
  <rect x="31" y="43" width="4" height="2" rx="0.5" fill="#475569" />
</svg>
