<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Front Wheels -->
  <rect x="20" y="10" width="3" height="8" rx="1" fill="#1E293B"/>
  <rect x="41" y="10" width="3" height="8" rx="1" fill="#1E293B"/>
  <!-- Rear Big Wheels -->
  <rect x="12" y="34" width="6" height="16" rx="3" fill="#1E293B" stroke="#0F172A" stroke-width="1"/>
  <rect x="46" y="34" width="6" height="16" rx="3" fill="#1E293B" stroke="#0F172A" stroke-width="1"/>
  <!-- Front Hood -->
