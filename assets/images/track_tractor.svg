<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Dynamic vehicle: Tractor -->
  <!-- Shadow under the tractor -->
  <path d="M15 10 L49 10 L49 50 L15 50 Z" fill="black" fill-opacity="0.15" />

  <!-- Tires -->
  <!-- Front Small Tires -->
  <rect x="18" y="10" width="4" height="8" rx="1.5" fill="#1E293B" />
  <rect x="42" y="10" width="4" height="8" rx="1.5" fill="#1E293B" />
  <!-- Rear Large Tires -->
  <rect x="11" y="32" width="7" height="18" rx="3.5" fill="#1E293B" />
  <rect x="46" y="32" width="7" height="18" rx="3.5" fill="#1E293B" />
  <!-- Rear Tire Hubs -->
  <rect x="12" y="36" width="2" height="10" rx="1" fill="#475569" />
  <rect x="50" y="36" width="2" height="10" rx="1" fill="#475569" />

  <!-- Front Engine Hood (Uses #MAIN_COLOR) -->
  <rect x="23" y="6" width="18" height="22" rx="2" fill="#MAIN_COLOR" />
  <rect x="23" y="6" width="9" height="22" rx="1" fill="black" fill-opacity="0.1" />
  <rect x="32" y="6" width="9" height="22" rx="1" fill="white" fill-opacity="0.08" />

  <!-- Cabin (Uses #MAIN_COLOR) -->
  <rect x="19" y="28" width="26" height="18" rx="3" fill="#MAIN_COLOR" />
  <rect x="19" y="28" width="13" height="18" rx="1" fill="black" fill-opacity="0.12" />
  <rect x="32" y="28" width="13" height="18" rx="1" fill="white" fill-opacity="0.08" />

  <!-- Cabin Glass (Windshield & side windows) -->
  <rect x="21" y="29.5" width="22" height="4" rx="1" fill="#0F172A" />
  <rect x="21.5" y="29" width="21" height="4.5" rx="1" fill="#38BDF8" />
  <path d="M36 29 L32 33 H30 L34 29 Z" fill="white" fill-opacity="0.4" />

  <!-- Exhaust stack / pipe (Sleek silver) -->
  <circle cx="26" cy="11.5" r="1.5" fill="#64748B" />
  <line x1="26" y1="11.5" x2="26" y2="5" stroke="#64748B" stroke-width="2.5" stroke-linecap="round" />
</svg>
