<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Dynamic vehicle: Van (Sleek Professional Style) -->
  <!-- Shadow under the van -->
  <rect x="18" y="6" width="28" height="52" rx="6" fill="black" fill-opacity="0.2" />
  
  <!-- Outer Body (Clean, streamlined aerodynamic shell) -->
  <rect x="19" y="5" width="26" height="52" rx="5" fill="#MAIN_COLOR" />
  
  <!-- Left Side Shading for 3D roundness -->
  <path d="M19 10 C19 7.2 20.2 5 23 5 H32 V57 H23 C20.2 57 19 54.8 19 52 Z" fill="black" fill-opacity="0.12" />
  
  <!-- Right Side Highlight -->
  <path d="M32 5 H41 C43.8 5 45 7.2 45 10 V52 C45 54.8 43.8 57 41 57 H32 Z" fill="white" fill-opacity="0.08" />

  <!-- Windshield -->
  <path d="M21 16 H43 L41.5 12 H22.5 Z" fill="#0B1329" />
  <path d="M22 15.5 H42 L41 12.5 H23 Z" fill="#00B4D8" />
  <path d="M35 12.5 L31 15.5 L29 15.5 L33 12.5 Z" fill="white" fill-opacity="0.35" />

  <!-- Roof Panels / Grooves (Typical van style) -->
  <rect x="23" y="19" width="18" height="26" rx="1.5" fill="none" stroke="black" stroke-opacity="0.15" stroke-width="1.5" />
  <line x1="27" y1="22" x2="27" y2="41" stroke="black" stroke-opacity="0.1" stroke-width="1" />
  <line x1="32" y1="22" x2="32" y2="41" stroke="black" stroke-opacity="0.1" stroke-width="1" stroke-linecap="round" />
  <line x1="37" y1="22" x2="37" y2="41" stroke="black" stroke-opacity="0.1" stroke-width="1" />

  <!-- Rear Window -->
  <path d="M21 49 H43 L42 51.5 H22 Z" fill="#0B1329" />
  <path d="M22 49.5 H42 L41.2 51 H22.8 Z" fill="#00B4D8" />
</svg>
