<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Bus Stop Signpost -->
  <rect x="15" y="4" width="3" height="54" rx="1" fill="#78909C"/>
  <circle cx="16.5" cy="14" r="10" fill="#E53935"/>
  <circle cx="16.5" cy="14" r="8" fill="#FFFFFF"/>
  
  <!-- Bus symbol on sign -->
  <rect x="12.5" y="11" width="8" height="6" rx="1.5" fill="#E53935"/>
  <rect x="13.5" y="12" width="6" height="3" fill="#FFFFFF"/>
  <circle cx="14.5" cy="18" r="1" fill="#E53935"/>
  <circle cx="18.5" cy="18" r="1" fill="#E53935"/>

  <!-- Bus (Front View) -->
  <rect x="28" y="22" width="28" height="32" rx="5" fill="#E53935"/>
  <rect x="28" y="46" width="28" height="8" rx="2" fill="#B71C1C"/>
  
  <!-- Windshield -->
  <rect x="31" y="26" width="22" height="12" rx="2" fill="#E0F2F1"/>
  <rect x="31" y="34" width="10" height="2" fill="#78909C"/>
  <rect x="43" y="34" width="10" height="2" fill="#78909C"/>
  
  <!-- Headlights -->
  <circle cx="33" cy="46" r="2.5" fill="#FFEB3B"/>
  <circle cx="51" cy="46" r="2.5" fill="#FFEB3B"/>
  
  <!-- Wheels -->
  <rect x="31" y="54" width="5" height="4" rx="1" fill="#37474F"/>
  <rect x="48" y="54" width="5" height="4" rx="1" fill="#37474F"/>
</svg>
