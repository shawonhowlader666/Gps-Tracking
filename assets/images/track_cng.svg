<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Dynamic vehicle: CNG (Three-wheeler / Rickshaw) -->
  <!-- Shadow -->
  <path d="M30 11 L34 11 L44 22 L45 47 C45 52 19 52 19 47 L20 22 Z" fill="black" fill-opacity="0.15" />
  
  <!-- Tires -->
  <!-- Front Tire (Centered) -->
  <rect x="30" y="8" width="4" height="10" rx="1.5" fill="#1E293B" />
  <!-- Rear Tires -->
  <rect x="15" y="42" width="4" height="11" rx="1.5" fill="#1E293B" />
  <rect x="45" y="42" width="4" height="11" rx="1.5" fill="#1E293B" />

  <!-- Body Chassis (Tapered shape) -->
  <path d="M30 13 C31.5 11 32.5 11 34 13 L43 22 L44 48 C44 51 20 51 20 48 L21 22 Z" fill="#MAIN_COLOR" />

  <!-- Shading on the Left side -->
  <path d="M30 13 C31.5 11 32 11 32 11 V49.5 C32 49.5 20 49 20 48 L21 22 Z" fill="black" fill-opacity="0.1" />
  
  <!-- Highlight on the Right side -->
  <path d="M32 11 C32 11 32.5 11 34 13 L43 22 L44 48 C44 49 32 49.5 32 49.5 V11" fill="white" fill-opacity="0.08" />

  <!-- Front hood shield (cream / yellow color typical of auto rickshaw hoods) -->
  <path d="M26 21 L38 21 L35 15 L29 15 Z" fill="#FEF08A" />
  <path d="M26 21 H32 V15 L29 15 Z" fill="black" fill-opacity="0.06" />

  <!-- Handlebars / Side Mirrors -->
  <line x1="22" y1="21" x2="42" y2="21" stroke="#475569" stroke-width="1.5" stroke-linecap="round" />
  <rect x="20" y="19" width="3" height="1.5" rx="0.5" fill="#1E293B" />
  <rect x="41" y="19" width="3" height="1.5" rx="0.5" fill="#1E293B" />

  <!-- Cabin Roof (Passes over the seats) -->
  <path d="M21 24 H43 V48 H21 Z" fill="#MAIN_COLOR" />
  <path d="M21 24 H32 V48 H21 Z" fill="black" fill-opacity="0.08" />
  <path d="M32 24 H43 V48 H32 Z" fill="white" fill-opacity="0.06" />

  <!-- Back Window -->
  <path d="M24 44 H40 V40 H24 Z" fill="#0F172A" />
  <path d="M24.5 43.5 H39.5 V40.5 H24.5 Z" fill="#38BDF8" />
  <path d="M34 40.5 L31 43.5 L29 43.5 L32 40.5 Z" fill="white" fill-opacity="0.4" />
</svg>
