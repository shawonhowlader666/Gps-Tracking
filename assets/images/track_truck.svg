<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Dynamic vehicle: Truck -->
  <!-- Shadow under the truck -->
  <rect x="15" y="6" width="34" height="52" rx="4" fill="black" fill-opacity="0.15" />
  
  <!-- Tires -->
  <rect x="13" y="11" width="4" height="10" rx="1.5" fill="#1E293B" />
  <rect x="47" y="11" width="4" height="10" rx="1.5" fill="#1E293B" />
  <rect x="12" y="44" width="5" height="11" rx="2" fill="#1E293B" />
  <rect x="47" y="44" width="5" height="11" rx="2" fill="#1E293B" />

  <!-- Cab (Front) (Uses #MAIN_COLOR) -->
  <path d="M18 6 H46 V24 H18 Z" fill="#MAIN_COLOR" />
  
  <!-- Left Side Shading of the Cab -->
  <path d="M18 6 H32 V24 H18 Z" fill="black" fill-opacity="0.1" />
  
  <!-- Right Side Highlight of the Cab -->
  <path d="M32 6 H46 V24 H32 Z" fill="white" fill-opacity="0.08" />

  <!-- Windshield -->
  <path d="M20 12 H44 V8 H20 Z" fill="#0F172A" />
  <path d="M21 11 H43 V9 H21 Z" fill="#38BDF8" />
  <path d="M36 9 L31 11 L29 11 L33 9 Z" fill="white" fill-opacity="0.4" />

  <!-- Cab Shield / Wind deflector (Uses #MAIN_COLOR with shadow/highlight) -->
  <rect x="23" y="16" width="18" height="4" rx="1" fill="#MAIN_COLOR" />
  <rect x="23" y="16" width="9" height="4" rx="1" fill="black" fill-opacity="0.12" />

  <!-- Cargo Flatbed (Rear Container) - Sleek modern aluminum/white cargo box -->
  <rect x="16" y="24" width="32" height="34" rx="3" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1" />
  <!-- Container Grooves (Vertical metal ridges) -->
  <line x1="22" y1="28" x2="22" y2="54" stroke="#E2E8F0" stroke-width="1.5" />
  <line x1="28" y1="28" x2="28" y2="54" stroke="#E2E8F0" stroke-width="1.5" />
  <line x1="36" y1="28" x2="36" y2="54" stroke="#E2E8F0" stroke-width="1.5" />
  <line x1="42" y1="28" x2="42" y2="54" stroke="#E2E8F0" stroke-width="1.5" />
</svg>
