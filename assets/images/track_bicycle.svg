<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Dynamic vehicle: Scooter / Delivery Moped (bicycle.svg) -->
  <!-- Shadow -->
  <path d="M26 12 L38 12 L38 52 L26 52 Z" fill="black" fill-opacity="0.15" />

  <!-- Handlebars -->
  <line x1="18" y1="20" x2="46" y2="20" stroke="#475569" stroke-width="3.5" stroke-linecap="round" />
  <rect x="15" y="18.5" width="4" height="3" rx="1" fill="#0F172A" />
  <rect x="45" y="18.5" width="4" height="3" rx="1" fill="#0F172A" />

  <!-- Mirrors -->
  <circle cx="17" cy="12" r="2.5" fill="#334155" />
  <circle cx="47" cy="12" r="2.5" fill="#334155" />
  <line x1="18" y1="20" x2="17" y2="14" stroke="#475569" stroke-width="1.5" />
  <line x1="46" y1="20" x2="47" y2="14" stroke="#475569" stroke-width="1.5" />

  <!-- Main Body (Scooter Shield & Floor) -->
  <path d="M24 15 C24 15 32 11 40 15 C41 22 41 38 38 46 C36 50 28 50 26 46 C23 38 23 22 24 15 Z" fill="#MAIN_COLOR" />
  <path d="M24 15 C24 15 32 11 32 11 V47.5 C32 47.5 28 47.5 26 46 C23 38 23 22 24 15 Z" fill="black" fill-opacity="0.1" />
  <path d="M32 11 C32 11 32.5 11 40 15 C41 22 41 38 38 46 C36 50 32 50 32 47.5 Z" fill="white" fill-opacity="0.08" />

  <!-- Front Mudguard / Nose -->
  <path d="M27 9 H37 C37 9 37 14 32 16 C27 14 27 9 27 9 Z" fill="#MAIN_COLOR" />
  <path d="M27 9 H32 V16 C27 14 27 9 27 9 Z" fill="black" fill-opacity="0.1" />

  <!-- Rider Seat (Leather texture) -->
  <path d="M27.5 26 C27.5 24 36.5 24 36.5 26 L35.5 40 C35.5 42 28.5 42 28.5 40 Z" fill="#5F3A1A" />
  <path d="M27.5 26 C27.5 24 32 24 32 24 V41.5 C28.5 41 28.5 41 28.5 40 Z" fill="black" fill-opacity="0.18" />

  <!-- Carrier Box / Delivery Box (Cohesive modern white box with gray lock) -->
  <rect x="25" y="44" width="14" height="10" rx="2" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1" />
  <rect x="25" y="44" width="7" height="10" rx="1" fill="black" fill-opacity="0.05" />
  <rect x="30" y="44" width="4" height="1.5" rx="0.5" fill="#94A3B8" />
</svg>
