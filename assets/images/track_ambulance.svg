<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Dynamic vehicle: Ambulance -->
  <!-- Shadow under the ambulance -->
  <rect x="17" y="5" width="30" height="54" rx="5" fill="black" fill-opacity="0.15" />

  <!-- Tires -->
  <rect x="14" y="11" width="4" height="10" rx="1.5" fill="#1E293B" />
  <rect x="46" y="11" width="4" height="10" rx="1.5" fill="#1E293B" />
  <rect x="14" y="43" width="4" height="10" rx="1.5" fill="#1E293B" />
  <rect x="46" y="43" width="4" height="10" rx="1.5" fill="#1E293B" />

  <!-- Main Body -->
  <rect x="18" y="5" width="28" height="54" rx="5" fill="#MAIN_COLOR" />

  <!-- Left Side Shading -->
  <path d="M18 10 C18 7.2 20.2 5 23 5 H32 V59 H23 C20.2 59 18 56.8 18 54 Z" fill="black" fill-opacity="0.1" />

  <!-- Right Side Highlight -->
  <path d="M32 5 H41 C43.8 5 46 7.2 46 10 V54 C46 56.8 43.8 59 41 59 H32 Z" fill="white" fill-opacity="0.08" />

  <!-- Windshield -->
  <path d="M20 13 H44 L42 9 H22 Z" fill="#0F172A" />
  <path d="M21 12.5 H43 L41.5 9.5 H22.5 Z" fill="#38BDF8" />
  <path d="M35 9.5 L31 12.5 L29 12.5 L33 9.5 Z" fill="white" fill-opacity="0.4" />

  <!-- White Roof Panel -->
  <rect x="21" y="17" width="22" height="32" rx="2" fill="#FFFFFF" />
  <!-- Shadow on left side of white roof panel -->
  <path d="M21 17 C21 17 21 49 21 49 H32 V17 Z" fill="black" fill-opacity="0.05" />

  <!-- Emergency Light Bar (Sleek red bar at front of roof) -->
  <rect x="27" y="14.5" width="10" height="2" rx="1" fill="#EF4444" />
  <rect x="27.5" y="15" width="9" height="1" rx="0.5" fill="#FCA5A5" />

  <!-- Red Cross Decal -->
  <rect x="29" y="29" width="6" height="6" rx="1.2" fill="#EF4444" />
  <line x1="32" y1="28.5" x2="32" y2="35.5" stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round" />
  <line x1="28.5" y1="32" x2="35.5" y2="32" stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round" />

  <!-- Rear Window -->
  <path d="M21 51 H43 L42 53.5 H22 Z" fill="#0F172A" />
  <path d="M22 51.5 H42 L41.2 53 H22.8 Z" fill="#38BDF8" />
</svg>
