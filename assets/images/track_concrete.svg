<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Dynamic vehicle: Concrete Mixer Truck -->
  <!-- Shadow under the truck -->
  <rect x="15" y="6" width="34" height="52" rx="4" fill="black" fill-opacity="0.15" />
  
  <!-- Tires -->
  <rect x="13" y="11" width="4" height="10" rx="1.5" fill="#1E293B" />
  <rect x="47" y="11" width="4" height="10" rx="1.5" fill="#1E293B" />
  <rect x="12" y="42" width="5" height="11" rx="2" fill="#1E293B" />
  <rect x="47" y="42" width="5" height="11" rx="2" fill="#1E293B" />

  <!-- Cab (Front) (Uses #MAIN_COLOR) -->
  <path d="M18 6 H46 V22 H18 Z" fill="#MAIN_COLOR" />
  <!-- Cab shading -->
  <path d="M18 6 H32 V22 H18 Z" fill="black" fill-opacity="0.1" />
  <path d="M32 6 H46 V22 H32 Z" fill="white" fill-opacity="0.08" />

  <!-- Windshield -->
  <path d="M20 11 H44 V7 H20 Z" fill="#0F172A" />
  <path d="M21 10 H43 V8 H21 Z" fill="#38BDF8" />
  <path d="M36 8 L31 10 L29 10 L33 8 Z" fill="white" fill-opacity="0.4" />

  <!-- Rotating Mixer Drum (Rear) -->
  <ellipse cx="32" cy="38" rx="14" ry="17" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1" />
  <!-- Drum shading -->
  <path d="M32 21 C24.3 21 18 28.6 18 38 C18 47.4 24.3 55 32 55 V21 Z" fill="black" fill-opacity="0.04" />
  <path d="M32 21 C39.7 21 46 28.6 46 38 C46 47.4 39.7 55 32 55 V21 Z" fill="white" fill-opacity="0.06" />

  <!-- Spiral Mixing Stripes / Blade Details (Sleek grey metallic lines) -->
  <path d="M20 31 Q32 39 44 31" fill="none" stroke="#94A3B8" stroke-width="2.5" stroke-linecap="round" />
  <path d="M18 38 Q32 46 46 38" fill="none" stroke="#94A3B8" stroke-width="2.5" stroke-linecap="round" />
  <path d="M20 45 Q32 53 44 45" fill="none" stroke="#94A3B8" stroke-width="2.5" stroke-linecap="round" />
</svg>
