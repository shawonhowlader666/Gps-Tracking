  <path d="M32 5 C32 5 45 19 45 36 C45 48 42 58 39 58 L25 58 C22 58 19 48 19 36 C19 19 32 5 32 5 Z" fill="black" fill-opacity="0.15" />

  <!-- Hull (Uses #MAIN_COLOR) -->
