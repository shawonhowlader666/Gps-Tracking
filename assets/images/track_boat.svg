  <!-- Right Side Highlight of Hull -->
  <path d="M32 4 H32 C32 4 44 18 44 36 C44 48 41 57 38 57 L32 57 Z" fill="white" fill-opacity="0.08" />

  <!-- White Deck Cabin -->
  <path d="M32 14 C32 14 38 22 38 34 C38 42 37 52 35 53 H29 C27 52 26 42 26 34 C26 22 32 14 32 14 Z" fill="#FFFFFF" />
  <path d="M32 14 C32 14 26 22 26 34 C26 42 27 52 29 53 H32 Z" fill="black" fill-opacity="0.05" />

  <!-- Windshield / Bridge Glass -->
  <path d="M26 26 C26 26 32 23 38 26 C37 28 27 28 26 26 Z" fill="#0F172A" />
  <path d="M26.5 25 C26.5 25 32 22 37.5 25 C36.5 27.5 27.5 27.5 26.5 25 Z" fill="#38BDF8" />
  <path d="M34 23 L31 26 H29 L32 23 Z" fill="white" fill-opacity="0.4" />

  <!-- Rear Lounge Seating area (off-white / gray) -->
  <rect x="27" y="32" width="10" height="4" rx="1.5" fill="#E2E8F0" />
  <rect x="27" y="32" width="5" height="4" rx="1.5" fill="black" fill-opacity="0.08" />
  
  <rect x="27" y="40" width="10" height="4" rx="1.5" fill="#E2E8F0" />
  <rect x="27" y="40" width="5" height="4" rx="1.5" fill="black" fill-opacity="0.08" />

  <!-- Swim Platform / Motor -->
  <rect x="28" y="57" width="8" height="3" rx="1" fill="#1E293B" />
</svg>
