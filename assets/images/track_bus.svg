<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Dynamic vehicle: Bus -->
  <!-- Shadow under the bus -->
  <rect x="16" y="4" width="32" height="56" rx="4" fill="black" fill-opacity="0.15" />

  <!-- Tires -->
  <rect x="13" y="12" width="4" height="12" rx="2" fill="#1E293B" />
  <rect x="47" y="12" width="4" height="12" rx="2" fill="#1E293B" />
  <rect x="13" y="44" width="4" height="12" rx="2" fill="#1E293B" />
  <rect x="47" y="44" width="4" height="12" rx="2" fill="#1E293B" />

  <!-- Body -->
  <rect x="17" y="4" width="30" height="56" rx="4" fill="#MAIN_COLOR" />

  <!-- Left Side Shading -->
  <path d="M17 8 C17 5.8 18.8 4 21 4 H32 V60 H21 C18.8 60 17 58.2 17 56 Z" fill="black" fill-opacity="0.1" />

  <!-- Right Side Highlight -->
  <path d="M32 4 H43 C45.2 4 47 5.8 47 8 V56 C47 58.2 45.2 60 43 60 H32 Z" fill="white" fill-opacity="0.08" />

  <!-- Windshield -->
  <path d="M19 11 H45 V7 H19 Z" fill="#0F172A" />
  <path d="M20 10 H44 V8 H20 Z" fill="#38BDF8" />
  <path d="M35 8 L31 10 L29 10 L33 8 Z" fill="white" fill-opacity="0.4" />

  <!-- Roof AC Unit / Vents (Uses a clean, modern off-white box) -->
  <rect x="23" y="18" width="18" height="16" rx="2" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1" />
  <!-- AC Unit shadows and lines -->
  <rect x="23" y="18" width="9" height="16" rx="2" fill="black" fill-opacity="0.05" />
  <line x1="27" y1="22" x2="37" y2="22" stroke="#CBD5E1" stroke-width="1.5" stroke-linecap="round" />
  <line x1="27" y1="26" x2="37" y2="26" stroke="#CBD5E1" stroke-width="1.5" stroke-linecap="round" />
  <line x1="27" y1="30" x2="37" y2="30" stroke="#CBD5E1" stroke-width="1.5" stroke-linecap="round" />

  <!-- Rear Window -->
  <path d="M19 56 H45 V54 H19 Z" fill="#0F172A" />
  <path d="M20 55.5 H44 V54.5 H20 Z" fill="#38BDF8" />

  <!-- Side Mirrors -->
  <line x1="17" y1="9" x2="13" y2="9" stroke="#475569" stroke-width="1.5" stroke-linecap="round" />
  <line x1="47" y1="9" x2="51" y2="9" stroke="#475569" stroke-width="1.5" stroke-linecap="round" />
  <rect x="12" y="8" width="1.5" height="4" rx="0.5" fill="#1E293B" />
  <rect x="50.5" y="8" width="1.5" height="4" rx="0.5" fill="#1E293B" />
</svg>
