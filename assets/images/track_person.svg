<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Dynamic vehicle/marker: Person walking -->
  <!-- Shadow under the person -->
  <ellipse cx="32" cy="34" rx="14" ry="18" fill="black" fill-opacity="0.15" />

  <!-- Left Foot -->
  <rect x="22" y="44" width="6" height="12" rx="3" fill="#334155" />
  <!-- Right Foot (Offset, walking forward) -->
  <rect x="36" y="32" width="6" height="12" rx="3" fill="#334155" />

  <!-- Torso (Uses #MAIN_COLOR with self-shading) -->
  <ellipse cx="32" cy="30" rx="14" ry="10" fill="#MAIN_COLOR" />
  <!-- Left Side Shading of Torso -->
  <path d="M18 30 C18 35.5 24.3 40 32 40 V20 C24.3 20 18 24.5 18 30 Z" fill="black" fill-opacity="0.1" />
  <!-- Right Side Highlight of Torso -->
  <path d="M32 20 C39.7 20 46 24.5 46 30 C46 35.5 39.7 40 32 40 V20 Z" fill="white" fill-opacity="0.08" />

  <!-- Head (Skin tone + hair) -->
  <circle cx="32" cy="26" r="7" fill="#FDBA74" />
  <!-- Hair / Cap (Clean black/slate flat design) -->
  <path d="M25 26 C25 20 39 20 39 26 C39 26 37 23 32 23 C27 23 25 26 25 26 Z" fill="#1E293B" />
</svg>
