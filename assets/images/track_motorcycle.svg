<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Dynamic vehicle: Motorcycle / Bike -->
  <!-- Shadow -->
  <path d="M26 12 L38 12 L38 52 L26 52 Z" fill="black" fill-opacity="0.15" />

  <!-- Handlebars -->
  <line x1="18" y1="18" x2="46" y2="18" stroke="#334155" stroke-width="3" stroke-linecap="round" />
  <!-- Bar Ends / Grips -->
  <rect x="15" y="16.5" width="4" height="3" rx="1" fill="#0F172A" />
  <rect x="45" y="16.5" width="4" height="3" rx="1" fill="#0F172A" />
  <!-- Side Mirrors -->
  <path d="M19 16.5 Q22 12 20 10" fill="none" stroke="#1E293B" stroke-width="1.5" stroke-linecap="round" />
  <path d="M45 16.5 Q42 12 44 10" fill="none" stroke="#1E293B" stroke-width="1.5" stroke-linecap="round" />
  <ellipse cx="20" cy="10" rx="2.5" ry="1.5" fill="#334155" />
  <ellipse cx="44" cy="10" rx="2.5" ry="1.5" fill="#334155" />

  <!-- Wheels (Front & Rear inline) -->
  <!-- Front Wheel -->
  <rect x="30" y="6" width="4" height="12" rx="2" fill="#0F172A" />
  <!-- Rear Wheel -->
  <rect x="30" y="44" width="4" height="14" rx="2" fill="#0F172A" />

  <!-- Body / Fuel Tank & Panels (Uses #MAIN_COLOR) -->
  <path d="M25 21 C25 21 32 18 39 21 C39 29 38 41 36 45 C32 47 32 47 28 45 C26 41 25 29 25 21 Z" fill="#MAIN_COLOR" />
  <path d="M25 21 C25 21 32 18 32 18 V46 C32 46 28 46 28 45 C26 41 25 29 25 21 Z" fill="black" fill-opacity="0.1" />
  <path d="M32 18 C32 18 32 18 39 21 C39 29 38 41 36 45 C32 47 32 47 32 46 Z" fill="white" fill-opacity="0.08" />

  <!-- Fuel Tank Cap (Silver detail) -->
  <circle cx="32" cy="24" r="2.5" fill="#94A3B8" />
  <circle cx="32" cy="24" r="1" fill="#475569" />

  <!-- Rider Seat (Leather texture style) -->
  <path d="M27 31 C27 31 32 30 37 31 C36.5 38 35.5 41 35 44 H29 C28.5 41 27.5 38 27 31 Z" fill="#1E293B" />
  <path d="M27 31 C27 31 32 30 32 30 V44 H29 C28.5 41 27.5 38 27 31 Z" fill="black" fill-opacity="0.15" />

  <!-- Exhaust Pipes / Engine block details (Side accents) -->
  <line x1="37" y1="36" x2="37" y2="49" stroke="#94A3B8" stroke-width="2" stroke-linecap="round" />
  <rect x="29" y="27" width="6" height="5" rx="1" fill="#475569" />
</svg>
