<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Dynamic vehicle: Police Car (Sleek Professional Style) -->
  <!-- Shadow under the car -->
  <rect x="18" y="6" width="28" height="52" rx="14" fill="black" fill-opacity="0.2" />
  
  <!-- Outer Body (Clean, streamlined aerodynamic shell) -->
  <rect x="19" y="5" width="26" height="52" rx="13" fill="#MAIN_COLOR" />
  
  <!-- Left Side Shading for 3D roundness -->
  <path d="M19 18 C19 10 26 5 32 5 V57 C26 57 19 52 19 44 Z" fill="black" fill-opacity="0.12" />
  
  <!-- Right Side Highlight -->
  <path d="M32 5 C38 5 45 10 45 18 V44 C45 52 38 57 32 57 Z" fill="white" fill-opacity="0.08" />

  <!-- White Center Police Panel/Stripe (Sleek design) -->
  <path d="M19.5 22 C19.5 22 32 21 44.5 22 L44 42 C44 42 32 43 20 42 Z" fill="#FFFFFF" />
  <path d="M19.5 22 C19.5 22 32 21 32 21 V43 C32 43 20 43 20 42 Z" fill="black" fill-opacity="0.06" />

  <!-- Panoramic Glass Roof / Windshield -->
  <path d="M22 17 C22 17 32 13 42 17 C42 17 41 24 23 24 Z" fill="#0B1329" />
  <path d="M23 17.5 C23 17.5 32 14.5 41 17.5 C41 17.5 40 23.5 24 23.5 Z" fill="#00B4D8" />
  <path d="M36 14.5 L30 23 L28 23 L34 14.5 Z" fill="white" fill-opacity="0.35" />

  <!-- Main Glass Roof Area with police rooftop overlay -->
  <path d="M23 24 H41 V37 H23 Z" fill="#0B1329" />
  <path d="M24 24 H40 V36 H24 Z" fill="#0077B6" fill-opacity="0.8" />
  <path d="M38 24 L29 36 H27 L36 24 Z" fill="white" fill-opacity="0.2" />

  <!-- Emergency Light Bar (futuristic integrated design) -->
  <rect x="23.5" y="28" width="17" height="4" rx="2" fill="#1E293B" />
  <rect x="24" y="28.5" width="8.5" height="3" rx="1.5" fill="#3B82F6" />
  <rect x="32.5" y="28.5" width="8.5" height="3" rx="1.5" fill="#EF4444" />
  <circle cx="28" cy="30" r="1" fill="#FFFFFF" fill-opacity="0.8" />
  <circle cx="36" cy="30" r="1" fill="#FFFFFF" fill-opacity="0.8" />

  <!-- Rear Window -->
  <path d="M23 37 H41 C41 37 40 45 32 46 C24 45 23 37 23 37 Z" fill="#0B1329" />
  <path d="M24 37.5 H40 C40 37.5 39 44 32 45 C25 44 24 37.5 24 37.5 Z" fill="#00B4D8" />
  <path d="M35 37 L30 44 L28 44 L33 37 Z" fill="white" fill-opacity="0.3" />

  <!-- Futuristic Headlights -->
  <path d="M21 7 L25 8" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" />
  <path d="M43 7 L39 8" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" />

  <!-- Sleek LED Tail Lights -->
  <path d="M21 54 C23 55 27 55 29 54" stroke="#FF0055" stroke-width="2.5" stroke-linecap="round" fill="none" />
  <path d="M43 54 C41 55 37 55 35 54" stroke="#FF0055" stroke-width="2.5" stroke-linecap="round" fill="none" />
</svg>
