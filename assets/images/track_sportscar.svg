<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Dynamic vehicle: Sports Car (Sleek Aggressive Style) -->
  <!-- Shadow under the car -->
  <path d="M19 6 C21 5 43 5 45 6 C47 12 49 22 49 32 C49 42 47 50 45 55 C43 57 21 57 21 55 C19 50 17 42 17 32 C17 22 19 12 19 6 Z" fill="black" fill-opacity="0.22" />

  <!-- Aerodynamic Body Contour (Tires tucked inside) -->
  <path d="M20 5 C22 4 42 4 44 5 C46 11 48 21 48 31 C48 39 46 47 44 53 C44 56 20 56 20 53 C18 47 16 39 16 31 C16 21 18 11 20 5 Z" fill="#MAIN_COLOR" />

  <!-- Left Side Shading -->
  <path d="M20 5 C22 4 32 4 32 4 V56 C32 56 20 56 20 53 C18 47 16 39 16 31 C16 21 18 11 20 5 Z" fill="black" fill-opacity="0.15" />

  <!-- Right Side Highlight -->
  <path d="M32 4 C32 4 42 4 44 5 C46 11 48 21 48 31 C48 39 46 47 44 53 C44 56 32 56 32 56 V4 Z" fill="white" fill-opacity="0.08" />

  <!-- Wide Tires (Tucked inside body - visible through vents/shadows slightly, but not sticking out) -->
  <!-- Front wheel arches/lines -->
  <path d="M16 14 C16.5 14 17.5 14 18 15" stroke="black" stroke-opacity="0.3" stroke-width="1.5" />
  <path d="M48 14 C47.5 14 46.5 14 46 15" stroke="black" stroke-opacity="0.3" stroke-width="1.5" />

  <!-- Aggressive Hood Lines & Vents -->
  <path d="M24 12 C26 15 38 15 40 12" fill="none" stroke="black" stroke-opacity="0.2" stroke-width="1.5" />
  <path d="M26 14 L29 18 M38 14 L35 18" stroke="white" stroke-opacity="0.2" stroke-width="1.5" stroke-linecap="round" fill="none" />

  <!-- High-Gloss Angular Windshield -->
  <path d="M21 21 C21 16 43 16 43 21 C42 23 22 23 21 21 Z" fill="#0A0F1D" />
  <path d="M22 20.5 C22 17 42 17 42 20.5 C41 22 23 22 22 20.5 Z" fill="#0096C7" />
  <path d="M36 17 L29 21.5 L27 21.5 L34 17 Z" fill="white" fill-opacity="0.35" />

  <!-- Low-profile Roof Cabin -->
  <path d="M22.5 22 H41.5 L39.5 38 H24.5 Z" fill="#MAIN_COLOR" />
  <path d="M22.5 22 H32 V38 H24.5 Z" fill="black" fill-opacity="0.15" />
  <path d="M32 22 H41.5 L39.5 38 H32 Z" fill="white" fill-opacity="0.08" />

  <!-- Rear Engine Glass Hatch (Supercar look) -->
  <path d="M24 39 H40 L38.5 44 H25.5 Z" fill="#0A0F1D" />
  <path d="M24.5 39.5 H39.5 L38 43.5 H26 Z" fill="#0096C7" />
  <path d="M35 39 L31 43 L29 43 L33 39 Z" fill="white" fill-opacity="0.3" />

  <!-- Integrated Active Spoiler (Sleek body integration) -->
  <path d="M19 49 C22 51 42 51 45 49 L46 51 C43 53 21 53 18 51 Z" fill="#1E293B" />
  
  <!-- Laser Headlights -->
  <path d="M21 6.5 L25 8" stroke="#FFF" stroke-width="2" stroke-linecap="round" />
  <path d="M43 6.5 L39 8" stroke="#FFF" stroke-width="2" stroke-linecap="round" />
  <path d="M20.5 5.5 L21.5 6.5" stroke="#00B4D8" stroke-width="1" />
  <path d="M43.5 5.5 L42.5 6.5" stroke="#00B4D8" stroke-width="1" />

  <!-- Red LED bar Tail Lights -->
  <rect x="21" y="52" width="22" height="1.5" rx="0.7" fill="#FF003F" />
</svg>
